server:
  addr: "0.0.0.0"
  port: 30078
  timezone: "Asia/Shanghai"

database:
  driver: "mysql"
  dsn: "${MYSQL_DSN}"

auth:
  admin_token: "${ADMIN_TOKEN}"

market:
  provider: "tushare"
  batch_size: 500

tushare:
  base_url: "https://api.tushare.pro"
  token: "${TUSHARE_TOKEN}"

log:
  level: "info"
