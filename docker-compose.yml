services:
  mysql:
    image: mysql:8.4
    container_name: stock-lens-mysql
    ports:
      - "33306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: stock_lens_root
      MYSQL_DATABASE: stock_lens
      MYSQL_USER: stock_lens
      MYSQL_PASSWORD: stock_lens
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ustock_lens -pstock_lens --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - stock_lens_mysql_data:/var/lib/mysql

volumes:
  stock_lens_mysql_data:
